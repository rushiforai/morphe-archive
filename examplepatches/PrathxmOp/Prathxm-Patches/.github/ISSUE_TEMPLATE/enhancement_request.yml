# Template inspired by: https://github.com/hoo-dles/morphe-patches
name: ⭐ Enhancement request
description: Create a new feature or enhancement request for an existing app.
title: 'feat: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        # Enhancement Request
        
        Before creating a new enhancement request, please keep the following in mind:
        
        - :rotating_light: **If you're requesting a patch for currently unsupported app, you're in the wrong place! Please request via Discussions.** :rotating_light:
        - **Do not submit a duplicate feature request**: Search for existing feature requests [here](https://github.com/PrathxmOp/Prathxm-Patches/issues?q=label%3A%22enhancement%22).
        - **Please don't ask for the world.** I'm only one person.
  - type: textarea
    attributes:
      label: Feature description
      description: |
        - Describe your feature in detail
        - Add images, videos, links, examples, references, etc. if possible
    validations:
      required: true
  - type: input
    attributes:
      label: App name
      placeholder: 'Chess.com, etc'
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your feature request will be closed if you don't follow the checklist below.
      options:
        - label: I am NOT asking for a patch of a new app.
          required: true
        - label: I have checked all open and closed feature requests and this is not a duplicate.
          required: true
        - label: I have chosen an appropriate title.
          required: true
        - label: All requested information has been provided properly.
          required: true
