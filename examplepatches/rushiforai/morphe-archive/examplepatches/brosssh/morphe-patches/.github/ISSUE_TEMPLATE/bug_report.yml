name: 🐞 Bug report
description: Report a bug or an issue.
title: 'bug([APP_NAME]): '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        # New bug report

        Before creating a new bug report, please keep the following in mind:

        - **Do not submit a duplicate bug report**: Search for existing bug reports [here](https://github.com/brosssh/morphe-patches/issues?q=is%3Aissue).
  - type: textarea
    attributes:
      label: Bug description
      description: |
        - Add images and videos if possible
        - Add steps to reproduce the bug if possible (Step 1. ... Step 2. ...)
    validations:
      required: true
  - type: input
    attributes:
      label: App version patched
      description: What app version you are using
    validations:
      required: true
  - type: input
    attributes:
      label: Patches version
      description: The patches version (find this in Morphe manager, next to my bundle source)
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your bug report will be closed if you don't follow the checklist below.
      options:
        - label: I have checked all open and closed bug reports and this is not a duplicate.
          required: true
        - label: All requested information has been provided properly.
          required: true
