# On push: always verify Gradle build. Semantic-release + GPG + attest run only when
# `GPG_PRIVATE_KEY` is configured (otherwise `ghaction-import-gpg` fails the whole job).
# Publishing without GPG: use workflow **Manual publish MPP**.
name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

jobs:
  release:
    name: Release
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    # `secrets` cannot be used in step-level `if` (workflow parse error); boolean via env is OK.
    env:
      HAS_GPG: ${{ secrets.GPG_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :patches:buildAndroid generatePatchesList clean

      - name: Setup Node.js
        if: ${{ env.HAS_GPG == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        if: ${{ env.HAS_GPG == 'true' }}
        run: npm install

      - name: Import GPG key
        if: ${{ env.HAS_GPG == 'true' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ vars.GPG_FINGERPRINT }}

      - name: Release
        if: ${{ env.HAS_GPG == 'true' }}
        uses: cycjimmy/semantic-release-action@v5
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest
        if: ${{ env.HAS_GPG == 'true' && steps.release.outputs.new_release_published == 'true' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: 'Morphe Patches ${{ steps.release.outputs.new_release_git_tag }}'
          subject-path: patches/build/libs/patches-*.mpp
