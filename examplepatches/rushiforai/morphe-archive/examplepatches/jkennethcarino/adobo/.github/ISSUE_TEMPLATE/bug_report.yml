name: Bug report
description: Report a bug or an issue.
title: 'bug: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        # Adobo Patches bug report

        Before creating a new bug report, please keep the following in mind:

        - **Do not submit a duplicate bug report**: Search for existing bug reports [here](https://github.com/jkennethcarino/adobo/issues?q=label%3A%22bug%22).
  - type: textarea
    attributes:
      label: Bug description
      description: |
        - Describe your bug in detail
        - List used patches and app version patched
        - Add steps to reproduce the bug if possible (Step 1. ... Step 2. ...)
        - Add images and videos if possible
    validations:
      required: true
  - type: input
    attributes:
      label: App version patched
      description: What app version you are using
    validations:
      required: true
  - type: textarea
    attributes:
      label: Patches logs
      description: Patch logs can be exported by clicking on the Copy button in the "Patching app" screen, when patching finishes.
      render: shell
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your bug report will be closed if you don't follow the checklist below.
      options:
        - label: I have checked all open and closed bug reports and this is not a duplicate.
          required: true
        - label: All requested information has been provided properly.
          required: true
